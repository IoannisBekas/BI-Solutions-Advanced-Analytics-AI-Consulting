      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /apps/powerbi-solutions
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /apps/quantus
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /apps/quantus/pipelines
