name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Env name scan
        run: npm run scan:env

      - name: Encoding scan
        run: npm run check:encoding

      - name: Root dependency audit
        run: npm audit --audit-level=moderate

      - name: Install Quantus dependencies
        run: |
          cd apps/quantus
          npm ci
          python -m pip install -r pipelines/requirements.txt
          python -m pip install pip-audit

      - name: Quantus dependency audit
        run: |
          cd apps/quantus
          npm audit --audit-level=moderate
          python -m pip_audit -r pipelines/requirements.txt

      - name: Install Power BI Solutions dependencies
        run: cd apps/powerbi-solutions && npm ci

      - name: Power BI Solutions dependency audit
        run: cd apps/powerbi-solutions && npm audit --audit-level=moderate

      - name: Typecheck root app
        run: npm run check

      - name: Lint and test Quantus
        run: |
          cd apps/quantus
          npm run lint
          npm run test
          python -m pytest -q

      - name: Lint and test Power BI Solutions
        run: |
          cd apps/powerbi-solutions
          npm run lint
          npm test

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
