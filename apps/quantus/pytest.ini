[pytest]
asyncio_mode = auto
filterwarnings =
    # Synthetic pipeline fixtures intentionally use short date indexes; these statsmodels
    # warnings are expected for deterministic unit tests and do not affect assertions.
    ignore:A date index has been provided, but it has no associated frequency information.*:statsmodels.tools.sm_exceptions.ValueWarning
    ignore:No supported index is available.*:statsmodels.tools.sm_exceptions.ValueWarning
    ignore:No supported index is available.*:FutureWarning
    ignore:Maximum Likelihood optimization failed to converge.*:statsmodels.tools.sm_exceptions.ConvergenceWarning
    ignore:Non-invertible starting MA parameters found.*:UserWarning
