<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Disaster Risk Reduction Finance Dashboard</title>
  <desc id="desc">Social preview showing 191 countries, INFORM Risk 2026, public DRR finance signals, and a stylized dashboard chart.</desc>
  <rect width="1200" height="630" fill="#fffaf7"/>
  <rect x="0" y="0" width="1200" height="18" fill="#06402B"/>
